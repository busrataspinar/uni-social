{% extends "base.html" %}

{% block title %}Kayıt Ol - UniSocial{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-6">
        <div class="card shadow border-0 rounded-3 my-4">
            <div class="card-body p-5">
                
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">UniSocial Kampüsüne Katıl</h2>
                    <p class="text-muted">Profilini oluştur ve üniversitendeki gelişmeleri kaçırma.</p>
                </div>

                <form action="{{ url_for('register') }}" method="POST">
                    
                    <div class="mb-3">
                        <label for="name" class="form-label fw-semibold">Ad Soyad</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 bg-light" id="name" name="name" placeholder="İsim Soyisim" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">E-posta Adresi</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                            <input type="email" class="form-control border-start-0 bg-light" id="email" name="email" placeholder="ogrenci@universite.edu.tr" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="department" class="form-label fw-semibold">Bölüm / Fakülte</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-mortarboard text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 bg-light" id="department" name="department" placeholder="Bilgisayar Mühendisliği" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Şifre</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 bg-light" id="password" name="password" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-3 fw-bold rounded-2 shadow-sm">
                        <i class="bi bi-person-plus me-2"></i>Hesap Oluştur
                    </button>
                    
                </form>
                <div class="text-center mt-4 border-top pt-3">
                    <p class="mb-0 text-muted">Zaten üye misiniz? <a href="{{ url_for('login') }}" class="text-primary fw-semibold text-decoration-none">Giriş Yapın</a></p>
                </div>

            </div>
        </div>
    </div>
</div>
{% endblock %}
